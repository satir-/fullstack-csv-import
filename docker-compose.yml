version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    command: ["npm", "run", "start:inspect"]
    ports:
      - "3000:3000"
      - "9229:9229"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: csv_import
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - postgres

  redis:
    image: redis:8
    container_name: redis
    ports:
      - "6379:6379"

  worker:
    build: ./backend
    container_name: worker
    command: ["npm", "run", "start:worker"]
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:
